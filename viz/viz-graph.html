.tb-title{font-size:.85rem;font-weight:700;color:#dedad6;}
.tb-tag{font-size:.65rem;color:#7e7c82;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,.06);}
.tb-hint{font-size:.67rem;color:#4e4c52;margin-left:auto;}
.tb-back{font-size:.7rem;padding:4px 10px;border:1px solid rgba(255,255,255,.12);border-radius:5px;color:#7e7c82;text-decoration:none;transition:.15s;}

svg{width:100%;height:100%;}

/* 图例 */

}
.lg-item{display:flex;align-items:center;gap:5px;}
.lg-line{height:2px;width:20px;border-radius:1px;}

/* ════════════════════════════════

════════════════════════════════ */
.info-panel{

  transition:border-color .2s;
}
.info-panel.show{display:flex;}
.info-panel.pinned{border-color:rgba(155,110,217,.5);box-shadow:0 0 18px rgba(155,110,217,.15);}

/* 粘性头部 */
.ip-header{
  padding:13px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,.07);

}
.ip-header-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.ip-id-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:3px;color:#fff;}
.ip-layer-name{font-size:.62rem;color:#7e7c82;}
.ip-pin-hint{
  margin-left:auto;font-size:.6rem;color:#4e4c52;white-space:nowrap;
  border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:1px 6px;

.ip-name-zh{font-size:.92rem;font-weight:700;margin-bottom:2px;}
.ip-name-en{font-size:.72rem;font-style:italic;color:#7e7c82;}

/* 可滚动内容区 */
.ip-body{
  overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.ip-body::-webkit-scrollbar{width:3px;}
.ip-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px;}

.ip-sec{display:flex;flex-direction:column;gap:5px;}
.ip-sec-label{font-size:.6rem;font-weight:700;letter-spacing:.08em;color:#4e4c52;text-transform:uppercase;}
.ip-text{font-size:.76rem;color:rgba(222,218,214,.8);line-height:1.65;white-space:pre-wrap;}
.ip-bullets{list-style:none;display:flex;flex-direction:column;gap:3px;}
.ip-bullets li{font-size:.74rem;color:rgba(222,218,214,.72);padding-left:11px;position:relative;line-height:1.5;}
.ip-bullets li::before{content:'·';position:absolute;left:1px;}
.ip-viol{font-size:.73rem;padding:8px 10px;border-radius:5px;background:rgba(200,100,70,.07);border-left:2px solid rgba(200,100,70,.38);color:rgba(200,155,120,.85);line-height:1.6;white-space:pre-wrap;}

.ip-analogy{display:grid;grid-template-columns:48px 1fr;gap:3px 8px;font-size:.72rem;}
.ip-analogy-domain{color:#4e4c52;font-weight:500;padding-top:2px;}
.ip-analogy-text{color:rgba(222,218,214,.7);line-height:1.5;}
.ip-divider{height:1px;background:rgba(255,255,255,.06);}

.ip-sr-id{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;color:#48aa76;white-space:nowrap;}

.ip-serves{display:flex;gap:4px;flex-wrap:wrap;}
.ip-sc{font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:2px;background:rgba(74,158,221,.22);color:#8ccaf0;}
.ip-gpc{font-size:.6rem;font-weight:600;padding:1px 5px;border-radius:2px;background:rgba(155,110,217,.2);color:#caa8f5;border:1px solid rgba(155,110,217,.2);}

  {id:'G5',layer:'G',x:820,y:36},{id:'G6',layer:'G',x:820,y:170},{id:'G7',layer:'G',x:820,y:322},{id:'G8',layer:'G',x:820,y:474}
];
const NODE_MAP={};NODE_DEFS.forEach(n=>NODE_MAP[n.id]=n);
function cx(n){return n.x+NW/2;} function cy(n){return n.y+NH/2;}
const COL={T:'#4a9edd',PA:'#9b6ed9',G:'#48aa76'};
const COL2={T:'#8ccaf0',PA:'#caa8f5',G:'#7ecfa0'};
const LAYER_NAMES={T:'T 层 · 本质目标层',PA:'PA 层 · 抽象公理层',G:'G 层 · 当前系统目标层'};

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
const ZH_LABELS={

══════════════════════════════════════════════════ */
const T_DETAIL={
  T1:{def:'The system must be formally describable.',reqs:['Distinguishable agents and environment','Describable states and evolution rules','Describable interactions (complete interfaces)'],viol:'若违反 → 根本得不到一个系统（不是"跑得不好"而是"连系统都不存在"）'},
  T2:{def:'The system must be in a legal state at every moment.',reqs:['State values in legal range (e.g. energy∈[0,100])','Write boundaries enforced: result / author / scope','Single source of truth + complete interfaces'],viol:'若违反 → 系统进入非法状态，后续所有演化结果不可信'},

/* ══════════════════════════════════════════════════
   边路径计算（与原版相同）
══════════════════════════════════════════════════ */
function edgePath(e){
  const f=NODE_MAP[e.from],t=NODE_MAP[e.to];if(!f||!t)return null;
  const fcx=cx(f),fcy=cy(f),tcx=cx(t),tcy=cy(t);
  let d,lx=0,ly=0;
  if(e.type==='T2PA'||e.type==='PA2G'){
    const x1=f.x+NW+2,y1=fcy,x2=t.x-7,y2=tcy,mx=(x1+x2)/2;
    d=`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`;lx=mx;ly=(y1+y2)/2;
  }else if(e.type==='T_int'){
    const x1=f.x-2,y1=fcy,x2=t.x-2,y2=tcy,off=Math.abs(y2-y1)>200?-22:-13;
    d=`M${x1} ${y1} C${x1+off} ${y1} ${x2+off} ${y2} ${x2} ${y2}`;lx=x1+off-8;ly=(y1+y2)/2;
  }else if(e.type==='PA_pair'){
    if(tcy>fcy){const x1=f.x+NW+2,y1=fcy,x2=t.x+NW+2,y2=tcy,off=Math.min(28,Math.abs(y2-y1)*.35);d=`M${x1} ${y1} C${x1+off} ${y1} ${x2+off} ${y2} ${x2} ${y2}`;lx=x1+off+6;ly=(y1+y2)/2;}
    else{const x1=f.x-2,y1=fcy,x2=t.x-2,y2=tcy,off=Math.min(28,Math.abs(y2-y1)*.35);d=`M${x1} ${y1} C${x1-off} ${y1} ${x2-off} ${y2} ${x2} ${y2}`;lx=x1-off-6;ly=(y1+y2)/2;}
  }else if(e.type==='G_int'){
    const fR=fcx>800,tR=tcx>800;
    if(!fR&&!tR||fR&&tR){const y1=f.y+NH+2,y2=t.y-2,my=(y1+y2)/2;d=`M${fcx} ${y1} C${fcx} ${my} ${tcx} ${my} ${tcx} ${y2}`;lx=(fcx+tcx)/2;ly=my;}
    else if(!fR&&tR){const x1=f.x+NW+2,y1=fcy,x2=t.x-7,y2=tcy,mx=(x1+x2)/2;d=`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`;lx=mx;ly=(y1+y2)/2;}
    else{const x1=f.x-2,y1=fcy,x2=t.x+NW+2,y2=tcy,mx=(x1+x2)/2;d=`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`;lx=mx;ly=(y1+y2)/2;}
  }
  return d?{d,lx,ly}:null;
}

/* ══════════════════════════════════════════════════
   渲染边（中英双语标签）
══════════════════════════════════════════════════ */
const TYPE_COLOR={T_int:'rgba(74,158,221,A)',T2PA:'rgba(74,158,221,A)',PA_pair:'rgba(155,110,217,A)',PA2G:'rgba(155,110,217,A)',G_int:'rgba(72,170,118,A)'};
const TYPE_DASH={T_int:'5,4',PA_pair:'4,4',G_int:'5,4'};
function edgeColor(type,a){return(TYPE_COLOR[type]||'rgba(200,200,200,A)').replace('A',a);}
const EDGE_ELS={},LABEL_ELS={};

function renderEdges(){
  const eg=document.getElementById('edge-g');
  const lg=document.getElementById('label-g');
  const EDGES=typeof GRAPH_EDGES!=='undefined'?GRAPH_EDGES:[];
  EDGES.forEach(e=>{
    const p=edgePath(e);if(!p)return;
    const key=e.from+'→'+e.to;
    const dash=TYPE_DASH[e.type];
    const path=el('path',{d:p.d,fill:'none',stroke:edgeColor(e.type,dash?.12:.14),'stroke-width':dash?1:1.3,'marker-end':'url(#arr)','class':'epath'});
    if(dash)path.setAttribute('stroke-dasharray',dash);
    path.setAttribute('data-key',key);
    eg.appendChild(path);
    EDGE_ELS[key]=path;

    // 双语标签
    const zhLbl=ZH_LABELS[key]||'';
    const enLbl=e.label||'';
    const enShort=enLbl.length>48?enLbl.slice(0,47)+'…':enLbl;
    const tw=Math.min(Math.max(zhLbl.length*9.5,enShort.length*4.5)+16,260);

    const lg2=el('g',{'class':'elabel','data-key':key});
    lg2.setAttribute('transform',`translate(${p.lx},${p.ly})`);
    lg2.style.display='none';

    const lb=el('rect',{x:-tw/2,y:-13,width:tw,height:26,rx:3,fill:'rgba(5,5,16,.95)',stroke:'rgba(255,255,255,.14)','stroke-width':.5});
    const lt1=el('text',{'text-anchor':'middle',y:-1,fill:'rgba(220,216,210,.9)','font-size':9,'font-family':'Noto Sans SC, sans-serif'});
    lt1.textContent=zhLbl;
    const lt2=el('text',{'text-anchor':'middle',y:12,fill:'rgba(180,176,172,.6)','font-size':7.5,'font-style':'italic','font-family':'system-ui, sans-serif'});
    lt2.textContent=enShort;

    lg2.appendChild(lb);lg2.appendChild(lt1);lg2.appendChild(lt2);
    lg.appendChild(lg2);
    LABEL_ELS[key]=lg2;
  });
}

/* ══════════════════════════════════════════════════
   固定/悬停逻辑
══════════════════════════════════════════════════ */
const EDGES_LIST=typeof GRAPH_EDGES!=='undefined'?GRAPH_EDGES:[];
let pinnedId=null;

function getNeighbors(id){
  const s=new Set([id]);
  EDGES_LIST.forEach(e=>{if(e.from===id)s.add(e.to);if(e.to===id)s.add(e.from);});
  return s;
}
function getConnEdges(id){
  const s=new Set();
  EDGES_LIST.forEach(e=>{if(e.from===id||e.to===id)s.add(e.from+'→'+e.to);});
  return s;
}

const SCALE=1.1;
function scaleNode(el,cxv,cyv,s){
  if(s===1){el.removeAttribute('transform');return;}
  el.setAttribute('transform',`translate(${cxv*(1-s)} ${cyv*(1-s)}) scale(${s})`);
}

function activate(id){
  const nb=getNeighbors(id),ce=getConnEdges(id);
  document.querySelectorAll('.node-g').forEach(g=>{
    const gid=g.getAttribute('data-id'),layer=g.getAttribute('data-layer');
    if(gid===id){scaleNode(g,parseFloat(g.getAttribute('data-cx')),parseFloat(g.getAttribute('data-cy')),SCALE);g.querySelector('.node-rect').setAttribute('filter',`url(#sh-${layer})`);g.querySelector('.node-rect').setAttribute('stroke',COL[layer]+'cc');g.style.opacity='1';}
    else if(nb.has(gid)){g.querySelector('.node-rect').setAttribute('stroke',COL[layer]+'88');g.style.opacity='1';}
    else{g.style.opacity='0.12';}
  });
  Object.entries(EDGE_ELS).forEach(([key,p])=>{
    if(ce.has(key)){const e=EDGES_LIST.find(x=>x.from+'→'+x.to===key);p.setAttribute('stroke',edgeColor(e?.type||'T2PA',.88));p.setAttribute('stroke-width','2.2');p.removeAttribute('stroke-dasharray');p.setAttribute('marker-end','url(#arr)');}
    else{p.setAttribute('stroke','rgba(255,255,255,.03)');p.setAttribute('stroke-width','1');}
  });
  Object.entries(LABEL_ELS).forEach(([key,lg])=>{lg.style.display=ce.has(key)?'block':'none';});
}

function deactivate(){
  document.querySelectorAll('.node-g').forEach(g=>{
    scaleNode(g,0,0,1);
    const layer=g.getAttribute('data-layer');
    g.querySelector('.node-rect').setAttribute('filter','url(#sh)');
    g.querySelector('.node-rect').setAttribute('stroke',COL[layer]+'55');
    g.style.opacity='1';
  });
  Object.entries(EDGE_ELS).forEach(([key,p])=>{
    const e=EDGES_LIST.find(x=>x.from+'→'+x.to===key);
    const dash=TYPE_DASH[e?.type];
    p.setAttribute('stroke',edgeColor(e?.type||'T2PA',dash?.12:.14));
    p.setAttribute('stroke-width',dash?'1':'1.3');
    if(dash)p.setAttribute('stroke-dasharray',dash);else p.removeAttribute('stroke-dasharray');
  });
  Object.values(LABEL_ELS).forEach(lg=>lg.style.display='none');
  document.getElementById('info-panel').classList.remove('show');
  document.getElementById('info-panel').classList.remove('pinned');
}

function onNodeEnter(id){if(pinnedId&&pinnedId!==id)return;activate(id);showInfoPanel(id);}
function onNodeLeave(id){if(pinnedId)return;deactivate();}

function onNodeClick(id){
  if(pinnedId===id){
    // 解除固定
    pinnedId=null;
    document.getElementById('info-panel').classList.remove('pinned');
    document.getElementById('ip-pin-hint').textContent='点击节点固定';
  }else{
    // 固定到此节点
    pinnedId=id;
    activate(id);
    showInfoPanel(id);
    document.getElementById('info-panel').classList.add('show','pinned');
    document.getElementById('ip-pin-hint').textContent='📌 已固定 · 再次点击解除';
  }
}

// 点击 SVG 空白区域：解除固定
document.getElementById('G').addEventListener('click',e=>{
  if(e.target===e.currentTarget||e.target.tagName==='rect'&&e.target.getAttribute('fill')&&!e.target.classList.contains('node-rect')&&!e.target.classList.contains('node-badge')){
    if(pinnedId){pinnedId=null;deactivate();}
  }
});

// Esc 解除固定
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&pinnedId){pinnedId=null;deactivate();}});

// 面板区点击不传播（防止解除固定）
document.getElementById('info-panel').addEventListener('click',e=>e.stopPropagation());

  const sEdge=sec('相关连线逻辑');
  EDGES_LIST.filter(e=>e.from===id||e.to===id).forEach(e=>{
    const other=e.from===id?e.to:e.from;
    const dir=e.from===id?'→':'←';
    const key=e.from+'→'+e.to;
    const zhL=ZH_LABELS[key]||'';
    const edgeDiv=document.createElement('div');edgeDiv.className='ip-edge';
    edgeDiv.style.borderLeftColor=col+'66';
    edgeDiv.innerHTML=`<strong>${dir} ${other}</strong>&nbsp;&nbsp;<span style="color:#7e7c82;font-size:.68rem">${zhL}</span>`;
    sEdge.appendChild(edgeDiv);
  });
  body.appendChild(sEdge);

  panel.classList.add('show');
}

/* ══════════════════════════════════════════════════
   初始化
══════════════════════════════════════════════════ */
renderNodes();
renderEdges();
requestAnimationFrame(()=>requestAnimationFrame(()=>{}));
</script>
