meta:
  name: 目标—要求体系 v1.1
  total_requirements: 226
  tier_definitions:
    hard: 理想情况下要让系统成立、闭环、长期演化，必须满足。
    deferred: 不属于最小主干，但对语义完整性、认知连续性、质量或后续演化重要，可后置。
    engineering: 实现层 / 非理想条件下的防故障、稳态化与恢复增强。
  goals:
    M0:
      title: 最小化目标
      definition: 只保留对“理想情况下最小无限时间演化”必要的对象、要求与机制。
    G0:
      title: 存在性目标
      definition: 系统能被形式化描述；若 G0 不成立，则无法谈论演化、闭环、稳定性与实现。
    G1:
      title: 硬不变量目标
      definition: 系统在任意时刻、任意演化步骤后都必须成立的条件；违反即进入非法状态。
    G2:
      title: 稳定性目标
      definition: 系统在理想条件下可无限时间演化；这是最小生存线。
    G3:
      title: 活性目标
      definition: 合法事件最终能到达该到达的地方；合法动作最终能被执行并产生效果。
    G4:
      title: 一致性与可追溯性目标
      definition: 状态变更不产生矛盾、双写或不可重建历史。
    G5:
      title: 语义正确性目标
      definition: 系统行为必须按设计语义发生。
    G6:
      title: 认知连续性目标
      definition: 每个 agent 在多轮演化中能保持自我连续感与工作连续感。
    G7:
      title: 鲁棒性目标
      definition: 在非理想条件下，系统稳健降级而不是崩溃。
    G8:
      title: 质量/公平/可演化目标
      definition: 长期运行中维持质量、公平与后续演化空间。
requirements:
- id: M0-001
  goal: M0
  goal_title: 最小化目标
  group: M0.1 最小化与失格判准
  tier: hard
  kind: requirement
  statement: 若删掉某个对象、字段或规则后，不破坏闭环、不破坏长期稳定、不破坏恢复能力，则该对象不应占据高层。
  parent: M0.1
  codifiable: false
  representation_hint: governance
  source_seq: 186
- id: M0-002
  goal: M0
  goal_title: 最小化目标
  group: M0.1 最小化与失格判准
  tier: hard
  kind: requirement
  statement: 任何高层规则至少应能回答：到达、看见、中断、输出、写回、再调度六问之一。
  parent: M0.1
  codifiable: false
  representation_hint: governance
  source_seq: 187
