  representation_hint: governance
  source_seq: 190
- id: M0-006
  goal: M0
  goal_title: 最小化目标
  group: M0.1 最小化与失格判准
  tier: hard
  kind: requirement
  statement: 如果一个系统会因为 context、通知或记忆无限积压而在有限时间内失效，则它不满足第一性原理要求。
  parent: M0.1
  codifiable: false
  representation_hint: governance
  source_seq: 191
- id: M0-007
  goal: M0
  goal_title: 最小化目标
  group: M0.1 最小化与失格判准
  tier: hard
  kind: requirement
  statement: '如果一个系统会因为注意力基线被场/活动永久污染而失去调度恢复能力，则它不满足长期演化要求。 --- ## N. 工程实现阶段仍建议满足的要求（但不属于理想主干）'
  parent: M0.1
  codifiable: false
  representation_hint: governance
  source_seq: 192
